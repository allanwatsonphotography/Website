<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
      color: #333;
      text-align: center;
    }
    header {
      background: #111;
      color: white;
      padding: 60px 20px;
    }
    section {
      padding: 40px 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #0070f3;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My Website</h1>
    <p>This is my first live website 🚀</p>
    <a class="btn" href="#about">Learn More</a>
  </header>

  <section id="about">
    <h2>About</h2>
    <p>This website is hosted for free using Netlify.</p>
  </section>

</body>
</html>
